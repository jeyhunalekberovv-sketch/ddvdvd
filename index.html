<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baku Midnight Drop | Аукцион цен</title>
    <style>
        :root {
            --bg-color: #0d0d11;
            --card-bg: #16161f;
            --accent-color: #ff3b30;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --green-pulse: #34c759;
            --admin-bg: #1e1e2a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
            max-width: 450px;
        }

        .header h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
            margin: 5px 0 0 0;
        }

        /* Карточка товара */
        .auction-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2c2c35;
            margin-bottom: 30px;
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 300px;
            background: #252530;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge-live {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: var(--accent-color);
            color: white;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 30px;
            text-transform: uppercase;
        }

        .card-content {
            padding: 20px;
        }

        .item-title {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 8px 0;
        }

        .item-info {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .price-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .current-price {
            font-size: 34px;
            font-weight: 800;
            color: var(--green-pulse);
            margin-top: 5px;
        }

        .next-drop-timer {
            font-size: 20px;
            font-weight: bold;
            color: var(--accent-color);
            margin-top: 5px;
            text-align: right;
        }

        .buy-btn {
            background-color: var(--text-main);
            color: var(--bg-color);
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Модальное окно регистрации */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #2c2c35;
        }

        .modal-content h3 { margin-top: 0; font-size: 20px; }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px 0;
            background: #252532;
            border: 1px solid #3a3a4a;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
        }

        .submit-btn {
            background: var(--green-pulse);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Панель администратора */
        .admin-panel {
            background: var(--admin-bg);
            width: 100%;
            max-width: 450px;
            padding: 20px;
            border-radius: 20px;
            border: 1px dashed #4a4a5a;
            box-sizing: border-box;
        }

        .admin-panel h2 { margin-top: 0; font-size: 18px; color: #ffcc00; text-transform: uppercase;}
    </style>
</head>
<body>

    <!-- Главный экран аукциона -->
    <div class="header">
        <h1>Midnight Drop</h1>
        <p>Успей забрать лот до того, как цена упадет в ноль или его купит кто-то другой!</p>
    </div>

    <div class="auction-card">
        <div class="image-container">
            <span class="badge-live">LIVE</span>
            <img id="itemImage" src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990?w=500" alt="Товар">
        </div>
        <div class="card-content">
            <div class="item-title" id="itemTitle">Загрузка товара...</div>
            <div class="item-info" id="itemDesc">Ожидание настройки менеджером...</div>

            <div class="price-section">
                <div>
                    <div style="font-size:12px; color:var(--text-muted); text-transform:uppercase;">Текущая цена</div>
                    <div class="current-price" id="priceDisplay">0 AZN</div>
                </div>
                <div>
                    <div style="font-size:12px; color:var(--text-muted); text-transform:uppercase; text-align:right;">Падение через</div>
                    <div class="next-drop-timer" id="timerDisplay">0с</div>
                </div>
            </div>

            <button class="buy-btn" onclick="openRegisterModal()">Купить Шмотку</button>
        </div>
    </div>

    <!-- Модалка регистрации перед покупкой -->
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <h3>Регистрация покупателя</h3>
            <p style="color: var(--text-muted); font-size:13px; margin-top:-10px;">Введи свои данные, чтобы зафиксировать цену лота за собой!</p>
            
            <label>Твое Имя</label>
            <input type="text" id="clientName" placeholder="Например: Jeyhun">

            <label>Номер телефона (WhatsApp)</label>
            <input type="tel" id="clientPhone" placeholder="+994 50 123 45 67" value="+994">

            <button class="submit-btn" onclick="confirmPurchase()">Подтвердить заказ в WhatsApp</button>
            <button class="buy-btn" style="background:transparent; color:var(--text-muted); font-size:14px; margin-top:10px; padding:5px;" onclick="closeModal('registerModal')">Отмена</button>
        </div>
    </div>

    <!-- АДМИН ПАНЕЛЬ -->
    <div class="admin-panel" id="adminSection">
        <h2>Управление лотом (Админка)</h2>
        
        <label>Ссылка на фото одежды (URL)</label>
        <input type="text" id="inputImg" value="https://images.unsplash.com/photo-1618354691373-d851c5c3a990?w=500">

        <label>Название одежды</label>
        <input type="text" id="inputTitle" value="Premium Oversize Hoodie">

        <label>Описание</label>
        <textarea id="inputDesc" rows="2">Запечатанная фабричная Турция. Плотный хлопок.</textarea>

        <div style="display: flex; gap: 10px;">
            <div>
                <label>Старт цена (AZN)</label>
                <input type="number" id="inputStartPrice" value="120">
            </div>
            <div>
                <label>Дно цены (AZN)</label>
                <input type="number" id="inputMinPrice" value="35">
            </div>
        </div>

        <div style="display: flex; gap: 10px;">
            <div>
                <label>Шаг спада (AZN)</label>
                <input type="number" id="inputDrop" value="5">
            </div>
            <div>
                <label>Интервал (сек)</label>
                <input type="number" id="inputInterval" value="20">
            </div>
        </div>

        <label>Твой личный номер WhatsApp (куда придут заказы)</label>
        <input type="text" id="myWhatsapp" value="994556071700" placeholder="994556071700">

        <button class="submit-btn" style="background:#ffcc00; color:black;" onclick="updateAuctionSettings()">Запустить / Обновить аукцион</button>
    </div>

    <script>
        // Переменные системы
        let currentPrice = 120;
        let minPrice = 35;
        let dropAmount = 5;
        let stepInterval = 20;
        let timeLeft = 20;
        let auctionTimer = null;
        let targetWhatsapp = "994501234567";

        // Функция обновления параметров админом
        function updateAuctionSettings() {
            let pass = prompt("Введите пароль администратора для запуска лота:");
            if (pass !== "1234") {
                alert("Неверный пароль!");
                return;
            }

            // Считываем значения из полей ввода
            document.getElementById('itemImage').src = document.getElementById('inputImg').value;
            document.getElementById('itemTitle').textContent = document.getElementById('inputTitle').value;
            document.getElementById('itemDesc').textContent = document.getElementById('inputDesc').value;

            currentPrice = parseInt(document.getElementById('inputStartPrice').value);
            minPrice = parseInt(document.getElementById('inputMinPrice').value);
            dropAmount = parseInt(document.getElementById('inputDrop').value);
            stepInterval = parseInt(document.getElementById('inputInterval').value);
            targetWhatsapp = document.getElementById('myWhatsapp').value;
            
            timeLeft = stepInterval;

            // Сброс и перезапуск таймера
            if (auctionTimer) clearInterval(auctionTimer);
            
            document.getElementById('priceDisplay').textContent = currentPrice + ' AZN';
            document.getElementById('timerDisplay').textContent = timeLeft + 'с';
            
            startAuctionEngine();
            alert("Лот успешно запущен в эфир!");
        }

        // Движок падения цены
        function startAuctionEngine() {
            auctionTimer = setInterval(() => {
                timeLeft--;
                document.getElementById('timerDisplay').textContent = timeLeft + 'с';

                if (timeLeft <= 0) {
                    if (currentPrice > minPrice) {
                        currentPrice -= dropAmount;
                        if (currentPrice < minPrice) currentPrice = minPrice;
                        document.getElementById('priceDisplay').textContent = currentPrice + ' AZN';
                    }
                    timeLeft = stepInterval;
                }
            }, 1000);
        }

        // Модальные окна
        function openRegisterModal() {
            document.getElementById('registerModal').style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        // Финал: отправка заявки владельцу
        function confirmPurchase() {
            let name = document.getElementById('clientName').value.trim();
            let phone = document.getElementById('clientPhone').value.trim();
            let itemTitle = document.getElementById('itemTitle').textContent;

            if (name === "" || phone === "" || phone === "+994") {
                alert("Пожалуйста, заполните имя и номер телефона!");
                return;
            }

            // Формируем текст заказа
            let message = `🔥 НОВЫЙ ЗАКАЗ С АУКЦИОНА! 🔥\n\n` +
                          `📦 Лот: ${itemTitle}\n` +
                          `💰 Зафиксированная цена: ${currentPrice} AZN\n\n` +
                          `👤 Покупатель: ${name}\n` +
                          `📞 Телефон: ${phone}`;

            // Ссылка на твой рабочий WhatsApp
            let link = `https://wa.me/${targetWhatsapp}?text=${encodeURIComponent(message)}`;
            
            closeModal('registerModal');
            // Перенаправляем клиента к тебе в чат
            window.location.href = link;
        }

        // Автостарт при первой загрузке
        startAuctionEngine();
        document.getElementById('itemTitle').textContent = document.getElementById('inputTitle').value;
        document.getElementById('itemDesc').textContent = document.getElementById('inputDesc').value;
        document.getElementById('priceDisplay').textContent = currentPrice + ' AZN';
    </script>
</body>
</html>
